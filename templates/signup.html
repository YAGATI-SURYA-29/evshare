{% extends "base.html" %}
{% block title %}Sign Up - EVShare{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-5">
        <div class="text-center mb-5">
          <div class="bg-success text-white p-4 rounded-circle mx-auto mb-4 shadow-lg" style="width:90px;height:90px;">
            <i class="fas fa-user-plus fs-1"></i>
          </div>
          <h2 class="fw-bold mb-2">Join EVShare</h2>
          <p class="text-muted lead mb-0">Create your apartment EV account</p>
        </div>

        <form method="post" action="/signup">
          <div class="mb-4">
            <label class="form-label fw-semibold fs-5">Full Name</label>
            <input type="text" class="form-control form-control-lg" name="name" placeholder="John Doe" required minlength="2" maxlength="50">
          </div>
          
          <div class="mb-4">
            <label class="form-label fw-semibold fs-5">Email Address</label>
            <input type="email" class="form-control form-control-lg" name="email" placeholder="john@avadi-apartments.in" required>
          </div>
          
          <div class="mb-4">
            <label class="form-label fw-semibold fs-5">Password</label>
            <input type="password" class="form-control form-control-lg" name="password" placeholder="••••••" required minlength="6">
            <div class="form-text">Minimum 6 characters</div>
          </div>
          
          <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" id="terms" required>
            <label class="form-check-label" for="terms">
              I agree to EVShare <a href="#" class="text-success">Terms</a> & <a href="#" class="text-success">Privacy</a>
            </label>
          </div>
          
          <button class="btn btn-success btn-lg w-100 py-3 fw-bold mb-3" type="submit">
            <i class="fas fa-user-plus me-2"></i>Create Account
          </button>
          
          <div class="text-center">
            <p class="text-muted mb-0">Already have an account? <a href="/login" class="text-success fw-semibold">Sign in</a></p>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
