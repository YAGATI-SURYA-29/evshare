{% extends "base.html" %}
{% block title %}Login - EVShare{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="bg-success text-white p-4 rounded-circle mx-auto mb-3" style="width:80px;height:80px;">
            <i class="fas fa-sign-in-alt fs-1"></i>
          </div>
          <h2 class="fw-bold mb-1">Welcome Back</h2>
          <p class="text-muted mb-0">Sign in to your apartment EV account</p>
        </div>

        <form id="login-form" method="post" action="/login" onsubmit="return fakeLogin(event)">
          <div class="mb-4">
            <label class="form-label fw-semibold">Email address</label>
            <input type="email" class="form-control form-control-lg" name="email" placeholder="you@apartment.in" required>
          </div>
          
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control form-control-lg" name="password" placeholder="••••••" required>
          </div>
          
          <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" id="remember" name="remember">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          
          <button class="btn btn-success btn-lg w-100 py-3 fw-bold" type="submit">
            <i class="fas fa-sign-in-alt me-2"></i>Sign In
          </button>
        </form>

        <div id="login-feedback" class="mt-4 text-center"></div>
        
        <div class="text-center mt-4">
          <p class="text-muted mb-0">Don't have an account? <a href="/signup" class="text-success fw-semibold">Sign up</a></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function fakeLogin(evt) {
  evt.preventDefault();
  const email = evt.target.email.value;
  const fb = document.getElementById('login-feedback');
  
  fb.innerHTML = '<div class="spinner-border spinner-border-sm text-success me-2" role="status"></div>Logging in...';
  
  setTimeout(() => {
    fb.innerHTML = `
      <div class="alert alert-success d-flex align-items-center">
        <i class="fas fa-check-circle me-2"></i>
        <strong>Welcome back, ${email.split('@')[0]}!</strong>
      </div>`;
    fireConfetti();
    
    // Fake redirect after 2s
    setTimeout(() => {
      window.location.href = '/scheduler';
    }, 2000);
  }, 1500);
  
  return false;
}
</script>
{% endblock %}
